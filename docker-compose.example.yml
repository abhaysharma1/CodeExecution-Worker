services:
  piston:
    image: ghcr.io/engineer-man/piston:latest
    container_name: piston_api
    privileged: true
    ports:
      - "2000:2000"
    volumes:
      - ./piston_data:/piston
    networks:
      - codecoliseum

  worker:
    image: node:20-alpine
    container_name: codecoliseum-worker-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    depends_on:
      - piston
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/codecoliseum?schema=express
      PISTON_URL: http://piston:2000
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      SQS_ENDPOINT: http://localstack:4566
      EXAM_SQS_QUEUE_URL: http://localstack:4566/000000000000/codecoliseum-exam
      PRACTICE_SQS_QUEUE_URL: http://localstack:4566/000000000000/codecoliseum-practice
      SQS_WAIT_TIME_SECONDS: "20"
      WORKER_IDLE_SLEEP_MS: "2000"
    volumes:
      - ./:/app
      - worker_node_modules:/app/node_modules
    networks:
      - codecoliseum

  worker_api:
    image: node:20-alpine
    container_name: codecoliseum-worker-api-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev:api"
    ports:
      - "3001:3000"
    depends_on:
      - piston
    environment:
      NODE_ENV: development
      PORT: "3000"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/codecoliseum?schema=express
      PISTON_URL: http://piston:2000
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      SQS_ENDPOINT: http://localstack:4566
      EXAM_SQS_QUEUE_URL: http://localstack:4566/000000000000/codecoliseum-exam
      PRACTICE_SQS_QUEUE_URL: http://localstack:4566/000000000000/codecoliseum-practice
    volumes:
      - ./:/app
      - worker_node_modules:/app/node_modules
    networks:
      - codecoliseum

volumes:
  worker_node_modules:

networks:
  codecoliseum:
    name: codecoliseum
    driver: bridge
